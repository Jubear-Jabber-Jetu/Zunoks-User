<div class="app-shell">
  <div class="bg-decoration" aria-hidden="true">
    <div class="vector-orb orb-green"></div>
    <div class="vector-orb orb-orange"></div>
    <svg class="vector-swoosh" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M10 60 Q80 10 190 20"
        stroke="url(#swooshGrad)"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
      />
      <defs>
        <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6cbe45" stop-opacity="0.15" />
          <stop offset="100%" stop-color="#f7941d" stop-opacity="0.25" />
        </linearGradient>
      </defs>
    </svg>
    <svg class="vector-dots" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="1" fill="#6cbe45" fill-opacity="0.12" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dotGrid)" />
    </svg>
  </div>

  <header class="app-header">
    <div class="header-accent"></div>
    <div class="header-inner">
      <a routerLink="/" class="logo-link">
        <img src="Company/zunoks_logo.png" alt="Zunoks — inspire to innovate" class="logo logo-zunoks" />
      </a>
      <span class="badge">
        <span class="badge-dot"></span>
        Benefits Benchmarking Survey 2026
      </span>
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <p class="footer-name">{{ contact.name }}</p>
        <p class="footer-tagline">{{ contact.tagline }}</p>
      </div>
      <div class="footer-contact">
        <a class="footer-link" [href]="contact.phoneHref">{{ contact.phone }}</a>
        <a class="footer-link" [href]="contact.emailHref">{{ contact.email }}</a>
        <p class="footer-address">{{ contact.address }}</p>
      </div>
      <a class="footer-website" [href]="contact.website" target="_blank" rel="noopener noreferrer">www.zunoks.com</a>
    </div>
  </footer>
</div>
