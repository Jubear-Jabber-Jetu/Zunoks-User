<div class="page-card success">
  <div class="success-icon" aria-hidden="true">
    <svg class="success-ring" viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="3" stroke-opacity="0.2"/>
      <circle class="ring-progress" cx="40" cy="40" r="36" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <svg class="success-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>Thank You!</h1>
  <p>Your survey has been submitted successfully.</p>
  <p class="info">Please return the completed questionnaire to your designated ZUNOKS contact.</p>

  @if (!downloaded) {
    <button class="btn btn-primary" (click)="download()">Download Excel Report</button>
  }
</div>
